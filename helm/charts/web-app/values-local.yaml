# Local environment overrides
# Only specify values that differ from values.yaml

deployment:
  containerPort: 8080
  image:
    registry: ""
    repository: ea/web-app
    tag: "1.0.0-local"
    pullPolicy: IfNotPresent

# Disable HPA for local
hpa:
  enabled: false

# ConfigMap - Non-sensitive configuration
configMap:
  NEO4J_URI: "bolt://neo4j.ns-ea.svc.cluster.local:7687"
  NEO4J_USERNAME: "neo4j"
  POSTGRES_HOST: "postgresql.ns-ea.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "app_user"
  POSTGRES_DB: "app_db"

# Secret - Sensitive credentials only
secret:
  NEO4J_PASSWORD: "neo4j123"
  POSTGRES_PASSWORD: "app_password"
  DATABASE_URL: "postgresql://app_user:app_password@postgresql.ns-ea.svc.cluster.local:5432/app_db"

# Service
service:
  port: 80
  targetPort: 8080

# Disable Ingress for local (use port-forward instead)
ingress:
  enabled: false
